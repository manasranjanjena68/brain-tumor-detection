<header class="bg-black text-white shadow-lg p-3 sticky top-0 z-50 transition duration-300 ease-in-out">
    <div class="container mx-auto flex flex-wrap justify-between items-center">
      <!-- Brand Name with Logo -->
      <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">
        <img src="/static/images/black.png" alt="NeuroCare Logo" class="w-12 h-12"> <!-- Adjust size as needed -->
        <span class="font-serif">NeuroCare</span>
      </h1>
  
      <!-- Navigation Links -->
      <nav class="flex flex-wrap items-center gap-6 md:mt-0 text-sm sm:text-base">
        <a href="/" class="font-serif hover:text-white transition">
          Home
        </a>
  
        <a href="/about" class="font-serif hover:text-white transition">
          About
        </a>
  
        <a href="/predict" class="font-serif hover:text-white transition">
          Predict
        </a>
  
        <a href="/contact" class="font-serif hover:text-white transition">
          Contact
        </a>
  
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}" class="font-serif hover:text-white transition">Dashboard</a>
          <a href="{% url 'my_predictions' %}" class="font-serif hover:text-white transition">My Predictions</a>
          <a href="{% url 'logout' %}" class="bg-yellow-500 px-4 py-2 rounded-md hover:bg-yellow-600 text-black font-medium transition shadow">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="font-serif hover:text-white transition">Login</a>
          <a href="{% url 'signup' %}" class="bg-yellow-500 px-4 py-2 rounded-md hover:bg-yellow-600 text-black font-medium transition shadow">Signup</a>
        {% endif %}
      </nav>
    </div>
</header>
