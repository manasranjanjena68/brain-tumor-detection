{% load static %}
{% load django_browser_reload %}
{% django_browser_reload_script %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Brain Tumor Detection{% endblock %}</title>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200 min-h-screen flex flex-col justify-between transition-colors duration-300 ease-in-out w-full overflow-x-hidden">

  <!-- Header -->
  {% include 'header.html' %}

  <!-- Main Content -->
  <main class="flex-grow w-full">
    <div class="w-full">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  {% include 'footer.html' %}

  <!-- Chat Toggle Button -->
  <button id="chatToggle"
    class="fixed bottom-6 right-6 bg-yellow-500 text-black font-semibold px-5 py-3 rounded-full shadow-2xl z-50 hover:bg-yellow-600 transition-all">
    💬 Ask Assistant
  </button>

  <!-- Chat Window -->
  <div id="chatBox"
    class="hidden fixed bottom-28 right-6 w-[380px] max-h-[80vh] flex flex-col bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-2xl shadow-2xl z-50 overflow-hidden animate__animated animate__fadeInUp">

    <!-- Header -->
    <div class="bg-blue-700 dark:bg-blue-800 text-white px-5 py-3 font-semibold text-lg flex justify-between items-center">
      NeuroBot Assistant
      <button onclick="toggleChat()" class="text-xl font-bold">×</button>
    </div>

    <!-- Message Area -->
    <div id="chatMessages"
      class="flex-1 px-4 py-4 space-y-4 overflow-y-auto bg-gray-50 dark:bg-gray-800 text-sm text-gray-900 dark:text-gray-200 scroll-smooth" style="max-height: 400px;">
      <!-- Messages will be appended dynamically -->
    </div>

    <!-- Input Area -->
    <div class="flex items-center border-t border-gray-200 dark:border-gray-700 px-4 py-3 bg-white dark:bg-gray-900 gap-2">
      <button onclick="startVoice()" class="text-blue-600 hover:text-blue-800 text-2xl">🎤</button>
      <input id="chatInput" type="text" placeholder="Ask something..."
        class="flex-1 px-4 py-2 text-sm rounded-full border border-gray-300 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-100 dark:bg-gray-800">
      <button onclick="sendChat()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-full transition">
        Send
      </button>
    </div>
  </div>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
    }
  </style>

  <!-- Chatbot Script -->
  <script>
    const toggleChat = () => {
      document.getElementById("chatBox").classList.toggle("hidden");
      // Ensure scrolling works after opening chat
      setTimeout(() => {
        const box = document.getElementById("chatMessages");
        if (box && !document.getElementById("chatBox").classList.contains("hidden")) {
          box.scrollTop = box.scrollHeight;
        }
      }, 100);
    };
    document.getElementById("chatToggle").addEventListener("click", toggleChat);

    function appendMsg(sender, msg) {
      const box = document.getElementById("chatMessages");
      const bubble = document.createElement("div");
      bubble.className = sender === "You" ? "flex justify-end" : "flex justify-start";
      bubble.innerHTML = `
        <div class="inline-block px-4 py-2 rounded-2xl max-w-xs w-fit ${
          sender === "You" ? "bg-yellow-100 dark:bg-yellow-600 text-gray-900" : "bg-blue-100 dark:bg-blue-600 text-gray-900"
        } shadow-sm animate__animated animate__fadeInUp">
          <strong>${sender}:</strong> ${msg}
        </div>
      `;
      box.appendChild(bubble);

      // Force scroll to bottom
      setTimeout(() => {
        box.scrollTop = box.scrollHeight + 1000;
      }, 10);
    }

    async function sendChat() {
      const input = document.getElementById("chatInput");
      const msg = input.value.trim();
      if (!msg) return;

      appendMsg("You", msg);
      input.value = "";

      const box = document.getElementById("chatMessages");
      const typingBubble = document.createElement("div");
      typingBubble.className = "flex justify-start";
      typingBubble.id = "typing";
      typingBubble.innerHTML = `
        <div class="inline-block px-4 py-2 rounded-2xl max-w-xs w-fit bg-blue-200 dark:bg-blue-700 text-gray-900 animate-pulse">
          🤖 Typing...
        </div>
      `;
      box.appendChild(typingBubble);

      // Force scroll immediately
      box.scrollTop = box.scrollHeight + 1000;

      try {
        const res = await fetch("/chatbot/ask/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
          },
          body: JSON.stringify({ question: msg })
        });

        const data = await res.json();
        document.getElementById("typing").remove();
        appendMsg("Bot", data.answer || "⚠️ No response.");
        
        // More aggressive scroll to bottom approach
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            box.scrollTop = box.scrollHeight + 1000;
          }, 100 * i + 100);
        }
      } catch (err) {
        document.getElementById("typing").remove();
        appendMsg("Bot", "Error contacting assistant.");
        
        // More aggressive scroll to bottom approach
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            box.scrollTop = box.scrollHeight + 1000;
          }, 100 * i + 100);
        }
      }
    }

    // Add event listener for Enter key
    document.getElementById("chatInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendChat();
      }
    });

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.onresult = function (event) {
        const msg = event.results[0][0].transcript;
        document.getElementById("chatInput").value = msg;
        sendChat();
      };
      recognition.start();
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === name + "=") {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  </script>

</body>
</html>
