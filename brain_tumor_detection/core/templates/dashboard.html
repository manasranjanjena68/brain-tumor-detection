{% extends "base.html" %}

{% block title %}My Dashboard{% endblock %}

{% block content %}
<main class="bg-gradient-to-br from-blue-900 to-black py-16 px-4 text-white">
<div class="max-w-4xl mx-auto bg-white shadow p-6 rounded">
    <h2 class="text-2xl font-bold mb-6">📊 Prediction Overview</h2>

    {% if chartLabels %}
        <canvas id="barChart" class="mb-8"></canvas>
        <canvas id="pieChart"></canvas>
    {% else %}
        <p class="text-gray-600">No prediction data yet.</p>
    {% endif %}
</div>

<!-- Inject safe JSON data -->
{{ chartLabels|json_script:"chart-labels" }}
{{ chartData|json_script:"chart-data" }}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Safely parse the injected JSON data
    const chartLabels = JSON.parse(document.getElementById('chart-labels').textContent);
    const chartData = JSON.parse(document.getElementById('chart-data').textContent);

    // Bar Chart
    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: 'Number of Predictions',
                data: chartData,
                backgroundColor: 'rgba(59, 130, 246, 0.7)',
                borderColor: 'rgba(59, 130, 246, 1)',
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    // Pie Chart
    const pieCtx = document.getElementById('pieChart').getContext('2d');
    new Chart(pieCtx, {
        type: 'pie',
        data: {
            labels: chartLabels,
            datasets: [{
                data: chartData,
                backgroundColor: [
                    '#3b82f6', '#10b981', '#f59e0b', '#ef4444'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
{% endblock %}
