{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-purple-50 to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg transform transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 border border-gray-100 animate-fade-in">
    <div class="text-center mb-6">
      <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-2">Welcome Back</h2>
      <p class="text-sm text-gray-500">Sign in to your account</p>
    </div>
    
    {% if form.errors %}
    <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg">
      <p>Your username and password didn't match. Please try again.</p>
    </div>
    {% endif %}
    
    <form method="post" class="space-y-6">
      {% csrf_token %}
      <div class="space-y-4">
        {{ form.as_p }}
      </div>
      
      <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white px-6 py-3 rounded-lg font-medium shadow-md hover:shadow-lg transform transition-all duration-300 ease-in-out hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 mt-4">
        Login
      </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-500">
      Don't have an account? 
      <a href="{% url 'signup' %}" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors duration-300">Sign up now</a>
    </div>
  </div>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .animate-fade-in {
    animation: fadeIn 0.6s ease-out forwards;
  }
  
  form p {
    margin-bottom: 1rem;
  }
  
  form input, form select, form textarea {
    width: 100%;
    padding: 0.5rem;
    border: 1px solid #e2e8f0;
    border-radius: 0.375rem;
    transition: all 0.3s;
  }
  
  form input:focus, form select:focus, form textarea:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
  }
  
  form label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: #4b5563;
  }
</style>
{% endblock %}
